
 <!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📊 Dashboard — Level Up Journal</title>
  <style>
    :root{
      --bg:#f8f5ff;--surface:#fff;--surface2:#f1eaff;--surface3:#e9deff;
      --border:#ddd0f5;--accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;
      --text:#1e1030;--sub:#6b5c8a;--green:#16a34a;--green-bg:#f0fdf4;--green-bdr:#bbf7d0;
      --red:#dc2626;--red-bg:#fef2f2;--yellow:#d97706;
      --radius:12px;--shadow:0 1px 4px rgba(124,58,237,.08),0 4px 20px rgba(124,58,237,.06);
    }
    [data-theme="dark"]{
      --bg:#100c1e;--surface:#1a1330;--surface2:#231a3a;--surface3:#2d2248;
      --border:#3d2f60;--accent:#a855f7;--accent2:#c084fc;--accent3:#7c3aed;
      --text:#f0e8ff;--sub:#9e8cc0;--green:#4ade80;--green-bg:#052e16;--green-bdr:#166534;
      --red:#f87171;--red-bg:#2d0a0a;--yellow:#fbbf24;
      --shadow:0 1px 4px rgba(0,0,0,.3),0 4px 20px rgba(0,0,0,.25);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s;padding-bottom:50px;}
    /* HEADER */
    .header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(124,58,237,.3);}
    .header h1{color:#fff;font-size:1.05rem;font-weight:700;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .hbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.8rem;font-weight:600;transition:background .15s;}
    .hbtn:hover{background:rgba(255,255,255,.3);}
    /* PAGE */
    .page{max-width:720px;margin:0 auto;padding:24px 16px 60px;display:flex;flex-direction:column;gap:20px;}
    /* STAT CARDS */
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center;}
    .stat-card .sv{font-size:1.8rem;font-weight:800;color:var(--accent);line-height:1;}
    .stat-card .sl{font-size:.72rem;color:var(--sub);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .card-header{display:flex;align-items:center;gap:8px;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
    .card-header h2{font-size:.82rem;font-weight:700;color:var(--accent);letter-spacing:.3px;text-transform:uppercase;}
    .card-header .ch-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .card-body{padding:18px;}
    /* HABIT BAR CHART */
    .habit-bars{display:flex;flex-direction:column;gap:9px;}
    .habit-bar-row{display:flex;align-items:center;gap:10px;}
    .hb-label{font-size:.82rem;width:170px;flex-shrink:0;color:var(--text);}
    .hb-track{flex:1;height:10px;background:var(--surface3);border-radius:50px;overflow:hidden;}
    .hb-fill{height:100%;border-radius:50px;background:linear-gradient(to right,var(--accent3),var(--accent));transition:width .5s ease;}
    .hb-pct{font-size:.75rem;color:var(--sub);width:36px;text-align:right;font-weight:600;}
    /* HISTORY TABLE */
    .history-filter{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .filter-btn{padding:5px 13px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface2);color:var(--sub);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
    .filter-btn.active,.filter-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
    .history-list{display:flex;flex-direction:column;gap:10px;}
    .entry-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;transition:border .15s,box-shadow .15s;}
    .entry-card:hover{border-color:var(--accent3);box-shadow:0 2px 12px rgba(124,58,237,.1);}
    .entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .entry-date{font-size:.88rem;font-weight:700;color:var(--text);}
    .entry-date span{font-size:.72rem;color:var(--sub);font-weight:400;margin-left:6px;}
    .entry-pills{display:flex;gap:6px;flex-wrap:wrap;}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:50px;font-size:.72rem;font-weight:700;}
    .pill-mood{background:var(--surface3);color:var(--accent);}
    .pill-sleep{background:#eff6ff;color:#2563eb;}
    [data-theme="dark"] .pill-sleep{background:#1e3a5f;color:#60a5fa;}
    .pill-habit{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr);}
    .pill-habit.low{background:var(--red-bg);color:var(--red);border-color:#fca5a5;}
    [data-theme="dark"] .pill-habit.low{border-color:#7f1d1d;}
    .entry-missions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
    .m-pill{font-size:.72rem;padding:3px 9px;border-radius:50px;font-weight:600;}
    .m-pill.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr);}
    .m-pill.todo{background:var(--surface3);color:var(--sub);}
    /* MOOD CHART */
    .mood-chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding-bottom:4px;}
    .mc-bar{flex:1;min-width:8px;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent3),var(--accent));cursor:pointer;transition:opacity .15s;position:relative;}
    .mc-bar:hover{opacity:.75;}
    .mc-bar .mc-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border-radius:5px;padding:2px 7px;font-size:.7rem;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;}
    .mc-bar:hover .mc-tip{opacity:1;}
    .mc-labels{display:flex;gap:4px;margin-top:4px;}
    .mc-lbl{flex:1;font-size:.6rem;color:var(--sub);text-align:center;overflow:hidden;white-space:nowrap;}
    /* EMPTY */
    .empty{text-align:center;padding:36px 20px;color:var(--sub);}
    .empty .e-icon{font-size:2.5rem;margin-bottom:10px;}
    .empty p{font-size:.88rem;}
    /* PAGINATION */
    .pag{display:flex;justify-content:center;gap:8px;margin-top:14px;}
    .pag-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--sub);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;}
    .pag-btn:hover,.pag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .pag-btn:disabled{opacity:.4;cursor:default;}
    @media(max-width:560px){.stat-row{grid-template-columns:1fr 1fr;}.hb-label{width:120px;}}
  </style>
</head>
<body>
<header class="header">
  <h1>📊 History Dashboard</h1>
  <div class="header-right">
    <button class="hbtn" onclick="window.location.href='journal.html'">✏️ Journal</button>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    <button class="hbtn" onclick="logout()">↩ Logout</button>
  </div>
</header>

<main class="page">
  <!-- STATS -->
  <div class="stat-row">
    <div class="stat-card"><div class="sv" id="st-streak">0</div><div class="sl">🔥 Streak</div></div>
    <div class="stat-card"><div class="sv" id="st-entries">0</div><div class="sl">📅 Total Days</div></div>
    <div class="stat-card"><div class="sv" id="st-avgmood">—</div><div class="sl">🌤 Avg Mood</div></div>
    <div class="stat-card"><div class="sv" id="st-avgsleep">—</div><div class="sl">😴 Avg Sleep</div></div>
  </div>

  <!-- MOOD CHART -->
  <div class="card">
    <div class="card-header"><span>📈</span><h2>Mood — Last 14 Days</h2></div>
    <div class="card-body">
      <div class="mood-chart" id="moodChart"></div>
      <div class="mc-labels" id="moodLabels"></div>
    </div>
  </div>

  <!-- HABIT COMPLETION -->
  <div class="card">
    <div class="card-header"><span>💪</span><h2>Habit Completion Rate</h2>
      <div class="ch-right">
        <select id="habitRange" onchange="renderHabitBars()" style="background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:7px;padding:4px 8px;font-size:.78rem;outline:none;">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="all">All time</option>
        </select>
      </div>
    </div>
    <div class="card-body"><div class="habit-bars" id="habitBars"></div></div>
  </div>

  <!-- HISTORY LOG -->
  <div class="card">
    <div class="card-header"><span>🗂</span><h2>Past Entries</h2></div>
    <div class="card-body">
      <div class="history-filter">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('7',this)">Last 7 days</button>
        <button class="filter-btn" onclick="setFilter('30',this)">Last 30 days</button>
        <button class="filter-btn" onclick="setFilter('perfect',this)">💯 Perfect Days</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <div class="pag" id="pag"></div>
    </div>
  </div>
</main>

<script>
const HABIT_META=[
  {id:'morning',label:'🌅 Morning Routine'},{id:'workout',label:'🥋 Workout/Karate'},
  {id:'protein',label:'🥩 Protein Meals'},{id:'water',label:'💧 Water 2.5–3L'},
  {id:'skincare',label:'✨ Skincare'},{id:'aistudy',label:'🤖 AI Study'},
  {id:'reading',label:'📖 Reading'},{id:'journal',label:'📓 Journal'},
  {id:'bedtime',label:'🌙 Sleep on time'},
];
const MISSION_META=[
  {id:'karate',label:'🥋 Karate'},{id:'aiml',label:'🤖 AI/ML'},{id:'health',label:'🌿 Health'},
];

let USER=null,allEntries=[],currentFilter='all',currentPage=1;
const PER_PAGE=7;

function getUser(){return USER||(USER=localStorage.getItem('luj_session'));}
function entryKey(d){return `luj_entry_${getUser()}_${d}`;}

function loadAllEntries(){
  allEntries=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`luj_entry_${getUser()}_`)){
      try{allEntries.push(JSON.parse(localStorage.getItem(k)));}catch(e){}
    }
  }
  allEntries.sort((a,b)=>b.date.localeCompare(a.date));
}

function calcStreak(){
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(localStorage.getItem(entryKey(d.toISOString().split('T')[0])))streak++;
    else break;
  }
  return streak;
}

function renderStats(){
  document.getElementById('st-streak').textContent=calcStreak();
  document.getElementById('st-entries').textContent=allEntries.length;
  const moods=allEntries.map(e=>+e.mood).filter(Boolean);
  document.getElementById('st-avgmood').textContent=moods.length?(moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1):'—';
  const sleeps=allEntries.map(e=>+e.sleep).filter(Boolean);
  document.getElementById('st-avgsleep').textContent=sleeps.length?(sleeps.reduce((a,b)=>a+b,0)/sleeps.length).toFixed(1)+'h':'—';
}

function renderMoodChart(){
  const chart=document.getElementById('moodChart'),labels=document.getElementById('moodLabels');
  chart.innerHTML='';labels.innerHTML='';
  const days=14;const today=new Date();const entries=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dStr=d.toISOString().split('T')[0];
    const raw=localStorage.getItem(entryKey(dStr));
    const mood=raw?+JSON.parse(raw).mood:null;
    entries.push({date:dStr,mood,label:d.toLocaleDateString('en',{month:'short',day:'numeric'})});
  }
  entries.forEach(e=>{
    const bar=document.createElement('div');bar.className='mc-bar';
    bar.style.height=e.mood?(e.mood/10*100)+'%':'4px';
    if(!e.mood)bar.style.background='var(--surface3)';
    bar.innerHTML=`<div class="mc-tip">${e.mood?'Mood: '+e.mood:'No entry'}<br>${e.label}</div>`;
    chart.appendChild(bar);
    const lbl=document.createElement('div');lbl.className='mc-lbl';lbl.textContent=e.label.split(' ')[1];
    labels.appendChild(lbl);
  });
}

function renderHabitBars(){
  const range=document.getElementById('habitRange').value;
  const today=new Date();
  let relevant=allEntries;
  if(range!=='all'){
    const n=+range;
    relevant=allEntries.filter(e=>{
      const d=new Date(e.date+'T00:00:00');
      return(today-d)/(1000*60*60*24)<=n;
    });
  }
  const bars=document.getElementById('habitBars');bars.innerHTML='';
  if(!relevant.length){bars.innerHTML='<div style="color:var(--sub);font-size:.85rem;text-align:center;padding:16px">No data for selected range.</div>';return;}
  HABIT_META.forEach(h=>{
    const done=relevant.filter(e=>e.habits&&e.habits[h.id]&&e.habits[h.id].done).length;
    const pct=Math.round(done/relevant.length*100);
    const row=document.createElement('div');row.className='habit-bar-row';
    row.innerHTML=`<div class="hb-label">${h.label}</div><div class="hb-track"><div class="hb-fill" style="width:${pct}%"></div></div><div class="hb-pct">${pct}%</div>`;
    bars.appendChild(row);
  });
}

let filterMode='all';
function setFilter(mode,btn){
  filterMode=mode;currentPage=1;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function getFilteredEntries(){
  const today=new Date();
  if(filterMode==='7')return allEntries.filter(e=>(today-new Date(e.date+'T00:00:00'))/(864e5)<=7);
  if(filterMode==='30')return allEntries.filter(e=>(today-new Date(e.date+'T00:00:00'))/(864e5)<=30);
  if(filterMode==='perfect')return allEntries.filter(e=>{
    if(!e.habits)return false;
    return Object.values(e.habits).every(h=>h.done);
  });
  return allEntries;
}

function formatDate(dStr){
  const d=new Date(dStr+'T00:00:00');
  return d.toLocaleDateString('en',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
}

function renderHistory(){
  const filtered=getFilteredEntries();
  const list=document.getElementById('historyList');
  const pag=document.getElementById('pag');
  list.innerHTML='';pag.innerHTML='';
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="e-icon">📭</div><p>No entries found for this filter.</p></div>`;
    return;
  }
  const pages=Math.ceil(filtered.length/PER_PAGE);
  const slice=filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);

  slice.forEach(e=>{
    const habitTotal=e.habits?Object.keys(e.habits).length:9;
    const habitDone=e.habits?Object.values(e.habits).filter(h=>h.done).length:0;
    const habitPct=Math.round(habitDone/habitTotal*100);
    const card=document.createElement('div');card.className='entry-card';
    const missionPills=MISSION_META.map(m=>{
      const done=e.missions&&e.missions[m.id]&&e.missions[m.id].done;
      return `<span class="m-pill ${done?'done':'todo'}">${m.label}${done?' ✓':''}</span>`;
    }).join('');
    card.innerHTML=`
      <div class="entry-top">
        <div class="entry-date">${formatDate(e.date)}${e.date===new Date().toISOString().split('T')[0]?'<span>Today</span>':''}</div>
        <div class="entry-pills">
          ${e.mood?`<span class="pill pill-mood">🌤 ${e.mood}/10</span>`:''}
          ${e.sleep?`<span class="pill pill-sleep">😴 ${e.sleep}h</span>`:''}
          <span class="pill pill-habit ${habitPct<50?'low':''}">💪 ${habitDone}/${habitTotal}</span>
        </div>
      </div>
      <div class="entry-missions">${missionPills}</div>
    `;
    card.style.cursor='pointer';
    card.addEventListener('click',()=>{
      document.getElementById('date') ? null : null;
      localStorage.setItem('luj_jumpdate',e.date);
      window.location.href='journal.html';
    });
    list.appendChild(card);
  });

  if(pages>1){
    const prev=document.createElement('button');prev.className='pag-btn';prev.textContent='← Prev';prev.disabled=currentPage===1;
    prev.onclick=()=>{currentPage--;renderHistory();};pag.appendChild(prev);
    for(let i=1;i<=pages;i++){
      const b=document.createElement('button');b.className='pag-btn'+(i===currentPage?' active':'');b.textContent=i;
      b.onclick=(pg=>()=>{currentPage=pg;renderHistory();})(i);pag.appendChild(b);
    }
    const next=document.createElement('button');next.className='pag-btn';next.textContent='Next →';next.disabled=currentPage===pages;
    next.onclick=()=>{currentPage++;renderHistory();};pag.appendChild(next);
  }
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').textContent=isDark?'🌙 Dark':'☀️ Light';
  localStorage.setItem('luj_theme',next);
}
function logout(){localStorage.removeItem('luj_session');window.location.href='index.html';}

document.addEventListener('DOMContentLoaded',()=>{
  if(!localStorage.getItem('luj_session')){window.location.href='index.html';return;}
  const t=localStorage.getItem('luj_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';
  loadAllEntries();
  renderStats();renderMoodChart();renderHabitBars();renderHistory();
});
</script>
</body>
</html>
